name: quiz_app
description: "A new Flutter project for Integrative Programming 2 Final."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1 
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.1.0 
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  path_provider: ^2.1.2
  google_fonts: ^6.2.1
  audioplayers: ^6.0.0 # Required for Sound
  confetti: ^0.7.0 
  pdf: ^3.12.0
  printing: ^5.13.2

dev_dependencies:
  test: ^1.30.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Registering the sound assets
  assets:
    - assets/sounds/success.mp3
    - assets/sounds/error.mp3
    - assets/images/html_template.png
    - assets/images/quiz_app_logo.png
    - assets/images/css_template.png
    - assets/images/cplusplus_template.png
    - assets/images/javascript_template.png
    - assets/images/flutter_template.png
    - assets/images/dart_template.png
    - assets/images/python_template.png
    - assets/images/swift_template.png
    - assets/images/react_template.png
    - assets/images/angular_template.png


    
